<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Твой Заряд</title>

    <style>

        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            padding: 30px;
            border-radius: 20px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: #facc15;
        }

        p {
            color: #cbd5e1;
        }

        /* КОНТЕЙНЕР ДЛЯ КНОПОК */
        .buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        /* КНОПКА СКАЧАТЬ */
        .main-btn {
            background-color: #facc15;
            color: black;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .main-btn:hover {
            transform: translateY(-2px);
        }

        .main-btn:active {
            transform: scale(0.95);
        }

        /* INSTAGRAM КНОПКА */
        .insta-btn {
            background-color: #E1306C;
            width: 45px;
            height: 45px;
            border-radius: 12px;

            display: flex;
            align-items: center;
            justify-content: center;

            transition: 0.2s;
        }

        .insta-btn img {
            width: 60px;
            height: 60px;
        }

        .insta-btn:hover {
            transform: translateY(-2px);
        }

        .insta-btn:active {
            transform: scale(0.9);
        }
        @media (max-width: 480px) {

        .card {
            width: 90%;
            padding: 20px;
        }

        h1 {
            font-size: 22px;
        }

        p {
            font-size: 14px;
        }

        .logo {
            width: 90px;
        }

        .buttons {
            flex-direction: row;
            gap: 12px;
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
        }

        .insta-btn {
            width: 40px;
            height: 40px;
        }

}

    </style>

</head>

<body>

    <div class="card">

        <img src="logo.png.png" class="logo">

        <h1>Твой Заряд ⚡</h1>
        <p>Аренда пауэрбанков в Бишкеке</p>
        <p>Работаем по всему городу</p>

        <div class="buttons">

            <a href="https://example.com" target="_blank">
                <button class="main-btn">Скачать приложение</button>
            </a>

            <a href="https://instagram.com/tvoizaryad?igsh=MWpxaGF0bnVrcnZ2cw==" target="_blank" class="insta-btn">
                <img src="icon.png" alt="Instagram">
            </a>

        </div>

    </div>

</body>
</html>
